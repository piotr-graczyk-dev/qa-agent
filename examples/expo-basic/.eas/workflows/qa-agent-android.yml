name: QA Agent Android Dogfood

on:
  pull_request:
    branches:
      - "*"

jobs:
  qa_agent_android:
    type: build
    params:
      platform: android
      profile: preview
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Write GitHub PR Context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p qa-agent
          npx qa-agent github-context --repo "$GITHUB_REPOSITORY" --pr "$GITHUB_PULL_REQUEST_NUMBER" --out qa-agent/pr-context.json
      - name: Provision QA Agent tooling
        env:
          QA_AGENT_EXAMPLE_EMAIL: qa@example.test
          QA_AGENT_EXAMPLE_PASSWORD: qa-agent-password
        run: ./scripts/qa-agent/provision-tooling.sh
      - name: Validate QA Agent configuration
        env:
          QA_AGENT_EXAMPLE_EMAIL: qa@example.test
          QA_AGENT_EXAMPLE_PASSWORD: qa-agent-password
        run: npx qa-agent doctor --project .
      - name: Install and launch Android QA app
        env:
          QA_AGENT_ANDROID_APPLICATION_ID: dev.piotrgraczyk.qaagent.example
        run: ./scripts/qa-agent/prepare-android-app.sh
      - name: Run QA Agent
        env:
          QA_AGENT_EXAMPLE_EMAIL: qa@example.test
          QA_AGENT_EXAMPLE_PASSWORD: qa-agent-password
        run: npx qa-agent run --project . --platform android --pr-context qa-agent/pr-context.json --out artifacts/qa-agent/android
      - name: Render GitHub QA Agent comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          render_args=(--project .)
          if [[ -f artifacts/qa-agent/android/qa-report.json ]]; then
            render_args+=(--android-report artifacts/qa-agent/android/qa-report.json)
          fi
          if [[ -f artifacts/qa-agent/ios/qa-report.json ]]; then
            render_args+=(--ios-report artifacts/qa-agent/ios/qa-report.json)
          fi
          npx qa-agent render-comment "${render_args[@]}" --repo "$GITHUB_REPOSITORY" --pr "$GITHUB_PULL_REQUEST_NUMBER" --upload-media
